name: Playwright Tests + Deploy

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [main]
    paths:
      - 'tests/e2e/**'
      - '.github/workflows/playwright-test-and-deploy.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install && cd tests/e2e && npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Codelpa tests
        env:
          BASE_URL: https://beta-codelpa.solopide.me
          COMMERCE_EMAIL: ${{ secrets.CODELPA_EMAIL }}
          COMMERCE_PASSWORD: ${{ secrets.CODELPA_PASSWORD }}
          CODELPA_EMAIL: ${{ secrets.CODELPA_EMAIL }}
          CODELPA_PASSWORD: ${{ secrets.CODELPA_PASSWORD }}
        working-directory: tests/e2e
        run: |
          rm -rf playwright-report
          npx playwright test b2b/codelpa.spec.ts b2b/config-validation.spec.ts -g "Codelpa|codelpa:" --reporter=html,"./reporters/grouped-report.ts",list

      - name: Copy Codelpa results
        if: always()
        run: |
          mkdir -p public/codelpa
          cp -r tests/e2e/playwright-report/* public/codelpa/

      - name: Run Surtiventas tests
        env:
          BASE_URL: https://surtiventas.solopide.me
          COMMERCE_EMAIL: ${{ secrets.SURTIVENTAS_EMAIL }}
          COMMERCE_PASSWORD: ${{ secrets.SURTIVENTAS_PASSWORD }}
          SURTIVENTAS_EMAIL: ${{ secrets.SURTIVENTAS_EMAIL }}
          SURTIVENTAS_PASSWORD: ${{ secrets.SURTIVENTAS_PASSWORD }}
        working-directory: tests/e2e
        run: |
          rm -rf playwright-report
          npx playwright test b2b/surtiventas.spec.ts b2b/config-validation.spec.ts -g "Surtiventas|surtiventas:" --reporter=html,"./reporters/grouped-report.ts",list

      - name: Copy Surtiventas results
        if: always()
        run: |
          mkdir -p public/surtiventas
          cp -r tests/e2e/playwright-report/* public/surtiventas/

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
