name: Playwright Nightly Tests

on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC = 11 PM Chile
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Codelpa tests
        env:
          CODELPA_EMAIL: ${{ secrets.CODELPA_EMAIL }}
          CODELPA_PASSWORD: ${{ secrets.CODELPA_PASSWORD }}
          CODELPA_BASE_URL: ${{ secrets.CODELPA_BASE_URL }}
          CODELPA_ADMIN_URL: ${{ secrets.CODELPA_ADMIN_URL }}
        run: npx playwright test --project=b2b --grep="Codelpa"

      - name: Copy Codelpa reports
        if: always()
        run: |
          rm -rf public/codelpa
          mkdir -p public/codelpa
          cp -r tests/e2e/playwright-report/* public/codelpa/ 2>/dev/null || true
          cp -r tests/e2e/playwright-report/grouped-report.html public/codelpa/ 2>/dev/null || true

      - name: Run Surtiventas tests
        if: always()
        env:
          SURTIVENTAS_EMAIL: ${{ secrets.SURTIVENTAS_EMAIL }}
          SURTIVENTAS_PASSWORD: ${{ secrets.SURTIVENTAS_PASSWORD }}
          SURTIVENTAS_BASE_URL: ${{ secrets.SURTIVENTAS_BASE_URL }}
          SURTIVENTAS_ADMIN_URL: ${{ secrets.SURTIVENTAS_ADMIN_URL }}
        run: npx playwright test --project=b2b --grep="Surtiventas"

      - name: Copy Surtiventas reports
        if: always()
        run: |
          rm -rf public/surtiventas
          mkdir -p public/surtiventas
          cp -r tests/e2e/playwright-report/* public/surtiventas/ 2>/dev/null || true
          cp -r tests/e2e/playwright-report/grouped-report.html public/surtiventas/ 2>/dev/null || true

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          cname: eduardolaloyom.github.io
