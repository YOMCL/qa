appId: ${APP_PACKAGE}
name: "PRINORTE-08: Filtro sin venta"
# hasNoSaleFilter = true

---

- stopApp
- launchApp
- runFlow:
    when:
      visible:
        text: ".*[Cc]orreo.*|.*[Ee]mail.*"
    commands:
      - tapOn:
          text: ".*[Cc]orreo.*|.*[Ee]mail.*"
      - inputText: ${TEST_SELLER_EMAIL}
      - tapOn:
          text: ".*[Cc]ontraseña.*|.*[Pp]assword.*|.*[Cc]lave.*"
      - inputText: ${TEST_SELLER_PASSWORD}
      - pressKey: Enter
      - runFlow:
          when:
            visible:
              text: ".*Samsung Pass.*"
          commands:
            - tapOn:
                text: "Cancelar"
      - tapOn:
          text: ".*[Ee]ntrar.*"
          optional: true
- extendedWaitUntil:
    visible:
      text: ".*[Cc]omercio.*|.*[Cc]liente.*|.*[Rr]uta.*|.*[Cc]at[aá]logo.*|.*SINCRONIZAR.*"
    timeout: 60000
- tapOn:
    text: ".*SINCRONIZAR.*|.*[Ss]incronizar.*"
    optional: true
- extendedWaitUntil:
    notVisible:
      text: ".*SINCRONIZAR.*"
    timeout: 120000
- tapOn:
    text: ".*[Cc]omercio.*|.*[Cc]liente.*|.*[Rr]uta.*"
    optional: true

# PRINORTE-08-01: Filtro sin venta disponible
- assertVisible:
    text: ".*[Ss]in [Vv]enta.*|.*[Ss]in [Cc]ompra.*|.*[Ff]iltro.*|.*[Ss]in [Pp]edido.*"

# PRINORTE-08-02: Aplicar filtro y ver resultado
- tapOn:
    text: ".*[Ss]in [Vv]enta.*|.*[Ss]in [Cc]ompra.*|.*[Ff]iltro.*"
    optional: true
- extendedWaitUntil:
    visible:
      text: ".*[Cc]omercio.*|.*[Cc]liente.*|.*[Rr]esultado.*"
    timeout: 10000

# PRINORTE-08-03: Limpiar filtro vuelve a lista completa
- tapOn:
    text: ".*[Tt]odos.*|.*[Ll]impiar.*|.*[Vv]er [Tt]odos.*"
    optional: true
- tapOn:
    text: ".*[Bb]uscar.*|.*[Ss]earch.*"
    optional: true
- inputText: ${TEST_COMMERCE_NAME}
- extendedWaitUntil:
    visible:
      text: ".*${TEST_COMMERCE_NAME}.*"
    timeout: 10000
