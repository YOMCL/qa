appId: ${APP_PACKAGE}
name: "CAREN: 03 — Catálogo comercios BLOQUEADOS"
# OBJETIVO: documentar cuántos productos muestra cada comercio bloqueado
# BUG SOSPECHADO: comercios bloqueados muestran catálogo completo (vs ~5 en disponibles)
# Verificar ADEMÁS que no se puede hacer pedido en ningún bloqueado
# Visita hasta 4 bloqueados; los que no existan se saltean automáticamente
---

# ─── COMERCIO BLOQUEADO 1 (obligatorio) ───────────────────────────────────────
- runFlow: helpers-filtro-bloqueado.yaml

- takeScreenshot: /tmp/caren-bloqueados-lista

- tapOn:
    text: ".*[Bb]loqueado.*"
    index: 0

- waitForAnimationToEnd

- tapOn:
    text: ".*[Hh]acer [Pp]edido.*|.*[Cc]at[aá]logo.*|.*[Pp]roductos.*"
    optional: true

- extendedWaitUntil:
    visible:
      text: ".*[Aa]gregar.*|.*[Cc]at[aá]logo.*|.*[Pp]roducto.*|.*[Ss]in.*productos.*|.*[Bb]loqueado.*|.*[Cc]ategor.*"
    timeout: 20000

- takeScreenshot: /tmp/caren-catalogo-bloqueado-1-top
- swipe:
    direction: DOWN
    duration: 1000
- takeScreenshot: /tmp/caren-catalogo-bloqueado-1-mid
- swipe:
    direction: DOWN
    duration: 1000
- takeScreenshot: /tmp/caren-catalogo-bloqueado-1-bottom

- assertNotVisible:
    text: ".*[Cc]onfirmar [Pp]edido.*|.*[Ee]nviar [Pp]edido.*"

- runFlow: helpers-volver-lista.yaml

# ─── COMERCIO BLOQUEADO 2 (condicional) ───────────────────────────────────────
- tapOn:
    text: ".*[Bb]loqueado.*"
    index: 1
    optional: true
- waitForAnimationToEnd

- runFlow:
    when:
      notVisible:
        text: "Seleccionar filtros"
    commands:
      - tapOn:
          text: ".*[Hh]acer [Pp]edido.*|.*[Cc]at[aá]logo.*|.*[Pp]roductos.*"
          optional: true
      - extendedWaitUntil:
          visible:
            text: ".*[Aa]gregar.*|.*[Cc]at[aá]logo.*|.*[Pp]roducto.*|.*[Ss]in.*productos.*|.*[Bb]loqueado.*|.*[Cc]ategor.*"
          timeout: 20000
      - takeScreenshot: /tmp/caren-catalogo-bloqueado-2-top
      - swipe:
          direction: DOWN
          duration: 1000
      - takeScreenshot: /tmp/caren-catalogo-bloqueado-2-mid
      - swipe:
          direction: DOWN
          duration: 1000
      - takeScreenshot: /tmp/caren-catalogo-bloqueado-2-bottom
      - assertNotVisible:
          text: ".*[Cc]onfirmar [Pp]edido.*|.*[Ee]nviar [Pp]edido.*"
      - runFlow: helpers-volver-lista.yaml

