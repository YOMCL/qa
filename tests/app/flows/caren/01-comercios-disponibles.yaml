appId: ${APP_PACKAGE}
name: "CAREN: 01 — Catálogo comercios DISPONIBLES (4 comercios)"
# OBJETIVO: documentar cuántos productos muestra cada comercio disponible
# BUG SOSPECHADO: comercios disponibles muestran solo ~5 productos (debería ser catálogo completo)
---

# ─── COMERCIO DISPONIBLE 1 (index 0) ──────────────────────────────────────────
- runFlow: caren/helpers-filtro-disponible.yaml

- takeScreenshot: /tmp/caren-disponibles-lista

- tapOn:
    text: ".*\\d{7,8}-\\d.*"
    index: 0
    optional: true

- runFlow:
    when:
      notVisible:
        text: ".*\\d{7,8}-\\d.*"
    commands:
      - tapOn:
          text: ".*[Dd]isponible.*"
          index: 0
          optional: true

- waitForAnimationToEnd

- tapOn:
    text: ".*[Hh]acer [Pp]edido.*|.*[Cc]at[aá]logo.*|.*[Pp]roductos.*"
    optional: true

- extendedWaitUntil:
    visible:
      text: ".*[Aa]gregar.*|.*[Cc]at[aá]logo.*|.*[Pp]roducto.*|.*[Ss]in.*productos.*|.*[Cc]ategor.*"
    timeout: 20000

- takeScreenshot: /tmp/caren-catalogo-disponible-1-top
- scrollUntilVisible:
    text: ".*[Ss]in.*productos.*|.*[Aa]gregar.*"
    direction: DOWN
    timeout: 10000
    optional: true
- takeScreenshot: /tmp/caren-catalogo-disponible-1-bottom

- runFlow: caren/helpers-volver-lista.yaml

