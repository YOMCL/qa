appId: ${APP_PACKAGE}
# Helper: aplica filtro "Disponible" desde la lista de comercios
# Precondición: estar en pantalla "Listado de comercios" con datos
---
# Intento 1: ID con package debug
- tapOn:
    id: "me.youorder.yomventas.debug:id/filters_button"
    optional: true
- waitForAnimationToEnd

# Intento 2: ID con package producción
- runFlow:
    when:
      notVisible:
        text: ".*[Dd]isponible.*|.*[Bb]loqueado.*|.*[Aa]dvertencia.*"
    commands:
      - tapOn:
          id: "me.youorder.yomventas:id/filters_button"
          optional: true
      - waitForAnimationToEnd

# Intento 3: por texto
- runFlow:
    when:
      notVisible:
        text: ".*[Dd]isponible.*|.*[Bb]loqueado.*|.*[Aa]dvertencia.*"
    commands:
      - tapOn:
          text: ".*[Ff]iltrar.*|.*[Ff]iltros.*|.*[Ff]ilter.*"
          optional: true
      - waitForAnimationToEnd

# Intento 4: hamburger ≡ top-right (coordenada)
- runFlow:
    when:
      notVisible:
        text: ".*[Dd]isponible.*|.*[Bb]loqueado.*|.*[Aa]dvertencia.*"
    commands:
      - tapOn:
          point: "93%,4%"
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: ".*[Dd]isponible.*|.*[Bb]loqueado.*"
    timeout: 15000

- tapOn:
    text: "Disponible"

- swipe:
    direction: UP
    duration: 300

- tapOn:
    point: "50%,93%"

- extendedWaitUntil:
    notVisible:
      text: ".*[Aa]plicar [Ff]iltros.*|.*[Aa]plicar filtros.*"
    timeout: 15000

- waitForAnimationToEnd
