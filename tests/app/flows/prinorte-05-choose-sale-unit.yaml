appId: ${APP_PACKAGE}
name: "PRINORTE-05: Elección de unidad de venta"
# enableChooseSaleUnit = true

---

- stopApp
- launchApp
- runFlow:
    when:
      visible:
        text: ".*[Cc]orreo.*|.*[Ee]mail.*"
    commands:
      - tapOn:
          text: ".*[Cc]orreo.*|.*[Ee]mail.*"
      - inputText: ${TEST_SELLER_EMAIL}
      - tapOn:
          text: ".*[Cc]ontraseña.*|.*[Pp]assword.*|.*[Cc]lave.*"
      - inputText: ${TEST_SELLER_PASSWORD}
      - pressKey: Enter
      - runFlow:
          when:
            visible:
              text: ".*Samsung Pass.*"
          commands:
            - tapOn:
                text: "Cancelar"
      - tapOn:
          text: ".*[Ee]ntrar.*"
          optional: true
- extendedWaitUntil:
    visible:
      text: ".*[Cc]omercio.*|.*[Cc]liente.*|.*[Rr]uta.*|.*[Cc]at[aá]logo.*|.*SINCRONIZAR.*"
    timeout: 60000
- tapOn:
    text: ".*SINCRONIZAR.*|.*[Ss]incronizar.*"
    optional: true
- extendedWaitUntil:
    notVisible:
      text: ".*SINCRONIZAR.*"
    timeout: 120000
- tapOn:
    text: ".*[Cc]omercio.*|.*[Cc]liente.*|.*[Rr]uta.*"
    optional: true
- tapOn:
    text: ".*[Bb]uscar.*|.*[Ss]earch.*"
    optional: true
- inputText: ${TEST_COMMERCE_NAME}
- extendedWaitUntil:
    visible:
      text: ".*${TEST_COMMERCE_NAME}.*"
    timeout: 10000
- tapOn:
    text: ".*${TEST_COMMERCE_NAME}.*"
    optional: true
- extendedWaitUntil:
    visible:
      text: ".*${TEST_PRODUCT_NAME}.*"
    timeout: 30000

# PRINORTE-05-01: Selector UND visible
- tapOn:
    text: ".*${TEST_PRODUCT_NAME}.*"
- assertVisible:
    text: ".*UND.*|.*[Uu]nidad.*"

# PRINORTE-05-02: Opción Display (DIS) disponible
- assertVisible:
    text: ".*DIS.*|.*[Dd]isplay.*|.*${TEST_PRODUCT_PACKAGE_UNIT}.*"

# PRINORTE-05-03: Cambiar a Display y verificar
- tapOn:
    text: ".*DIS.*|.*[Dd]isplay.*"
    optional: true
- assertVisible:
    text: ".*DIS.*|.*[Dd]isplay.*|.*[Pp]recio.*"
