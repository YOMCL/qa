appId: ${APP_PACKAGE}
name: "PRINORTE-02: Sincronización"

---

# Login inicial
- stopApp
- launchApp
- runFlow:
    when:
      visible:
        text: ".*[Cc]orreo.*|.*[Ee]mail.*"
    commands:
      - tapOn:
          text: ".*[Cc]orreo.*|.*[Ee]mail.*"
      - inputText: ${TEST_SELLER_EMAIL}
      - tapOn:
          text: ".*[Cc]ontraseña.*|.*[Pp]assword.*|.*[Cc]lave.*"
      - inputText: ${TEST_SELLER_PASSWORD}
      - pressKey: Enter
      - runFlow:
          when:
            visible:
              text: ".*Samsung Pass.*"
          commands:
            - tapOn:
                text: "Cancelar"
      - tapOn:
          text: ".*[Ee]ntrar.*"
          optional: true
- extendedWaitUntil:
    visible:
      text: ".*[Cc]omercio.*|.*[Cc]liente.*|.*[Rr]uta.*|.*[Cc]at[aá]logo.*|.*SINCRONIZAR.*"
    timeout: 60000

# PRINORTE-02-01: Disparar sincronización
- tapOn:
    text: ".*SINCRONIZAR.*|.*[Ss]incronizar.*"
    optional: true
- extendedWaitUntil:
    notVisible:
      text: ".*SINCRONIZAR.*"
    timeout: 120000

# PRINORTE-02-02: Comercio visible post-sync
- tapOn:
    text: ".*[Bb]uscar.*|.*[Ss]earch.*"
    optional: true
- inputText: ${TEST_COMMERCE_NAME}
- extendedWaitUntil:
    visible:
      text: ".*${TEST_COMMERCE_NAME}.*"
    timeout: 10000

# PRINORTE-02-03: Navegar al catálogo y verificar productos
- tapOn:
    text: ".*${TEST_COMMERCE_NAME}.*"
    optional: true
- extendedWaitUntil:
    visible:
      text: ".*${TEST_PRODUCT_NAME}.*"
    timeout: 30000

# PRINORTE-02-04: Pull-to-refresh re-sincroniza
- swipe:
    direction: DOWN
    duration: 1000
- extendedWaitUntil:
    visible:
      text: ".*${TEST_PRODUCT_NAME}.*|.*[Cc]at[aá]logo.*"
    timeout: 30000
