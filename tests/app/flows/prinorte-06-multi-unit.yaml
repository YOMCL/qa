appId: ${APP_PACKAGE}
name: "PRINORTE-06: Multi-unidad"
# hasMultiUnitEnabled = true

---

- stopApp
- launchApp
- runFlow:
    when:
      visible:
        text: ".*[Cc]orreo.*|.*[Ee]mail.*"
    commands:
      - tapOn:
          text: ".*[Cc]orreo.*|.*[Ee]mail.*"
      - inputText: ${TEST_SELLER_EMAIL}
      - tapOn:
          text: ".*[Cc]ontraseña.*|.*[Pp]assword.*|.*[Cc]lave.*"
      - inputText: ${TEST_SELLER_PASSWORD}
      - pressKey: Enter
      - runFlow:
          when:
            visible:
              text: ".*Samsung Pass.*"
          commands:
            - tapOn:
                text: "Cancelar"
      - tapOn:
          text: ".*[Ee]ntrar.*"
          optional: true
- extendedWaitUntil:
    visible:
      text: ".*[Cc]omercio.*|.*[Cc]liente.*|.*[Rr]uta.*|.*[Cc]at[aá]logo.*|.*SINCRONIZAR.*"
    timeout: 60000
- tapOn:
    text: ".*SINCRONIZAR.*|.*[Ss]incronizar.*"
    optional: true
- extendedWaitUntil:
    notVisible:
      text: ".*SINCRONIZAR.*"
    timeout: 120000
- tapOn:
    text: ".*[Cc]omercio.*|.*[Cc]liente.*|.*[Rr]uta.*"
    optional: true
- tapOn:
    text: ".*[Bb]uscar.*|.*[Ss]earch.*"
    optional: true
- inputText: ${TEST_COMMERCE_NAME}
- extendedWaitUntil:
    visible:
      text: ".*${TEST_COMMERCE_NAME}.*"
    timeout: 10000
- tapOn:
    text: ".*${TEST_COMMERCE_NAME}.*"
    optional: true
- extendedWaitUntil:
    visible:
      text: ".*${TEST_PRODUCT_NAME}.*"
    timeout: 30000
- tapOn:
    text: ".*${TEST_PRODUCT_NAME}.*"

# PRINORTE-06-01: Múltiples unidades disponibles (UND, DIS)
- assertVisible:
    text: ".*UND.*|.*DIS.*|.*[Cc]aja.*"

# PRINORTE-06-02: Step +1 funciona correctamente
- tapOn:
    text: ".*\\+.*"
    optional: true
- assertVisible:
    text: ".*1.*"
- tapOn:
    text: ".*\\+.*"
    optional: true
- assertVisible:
    text: ".*2.*"

# PRINORTE-06-03: Step -1 funciona (no baja de minUnit=1)
- tapOn:
    text: ".*-.*|.*[Qq]uitar.*"
    optional: true
- assertVisible:
    text: ".*1.*"
