appId: ${APP_PACKAGE}
name: "PRINORTE-12: Fotos de productos"

---

# Login condicional
- stopApp
- launchApp
- runFlow:
    when:
      visible:
        text: ".*[Cc]orreo.*|.*[Ee]mail.*"
    commands:
      - tapOn:
          text: ".*[Cc]orreo.*|.*[Ee]mail.*"
      - inputText: ${TEST_SELLER_EMAIL}
      - tapOn:
          text: ".*[Cc]ontraseña.*|.*[Pp]assword.*|.*[Cc]lave.*"
      - inputText: ${TEST_SELLER_PASSWORD}
      - pressKey: Enter
- extendedWaitUntil:
    visible:
      text: ".*[Cc]omercio.*|.*[Cc]liente.*|.*[Rr]uta.*|.*[Cc]at[aá]logo.*|.*SINCRONIZAR.*"
    timeout: 60000

# Sync si es necesario
- tapOn:
    text: ".*SINCRONIZAR.*|.*[Ss]incronizar.*"
    optional: true
- extendedWaitUntil:
    notVisible:
      text: ".*SINCRONIZAR.*"
    timeout: 120000

# Seleccionar comercio
- tapOn:
    text: ".*[Bb]uscar.*|.*[Ss]earch.*"
    optional: true
- inputText: ${TEST_COMMERCE_NAME}
- extendedWaitUntil:
    visible:
      text: ".*${TEST_COMMERCE_NAME}.*"
    timeout: 10000
- tapOn:
    text: ".*${TEST_COMMERCE_NAME}.*"
- extendedWaitUntil:
    visible:
      text: ".*[Cc]at[aá]logo.*|.*[Pp]roduct.*|.*${TEST_PRODUCT_CATEGORY}.*"
    timeout: 30000

# PRINORTE-12-01: Verificar que hay imágenes de producto visibles
# Si no hay fotos configuradas, los elementos de imagen no estarán presentes
- assertVisible:
    id: ".*[Ii]mage.*|.*[Pp]hoto.*|.*[Ff]oto.*|.*img.*"
    optional: false
