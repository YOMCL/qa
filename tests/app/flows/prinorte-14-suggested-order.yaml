appId: ${APP_PACKAGE}
name: "PRINORTE-14: Pedido sugerido"

---

# Login condicional
- stopApp
- launchApp
- runFlow:
    when:
      visible:
        text: ".*[Cc]orreo.*|.*[Ee]mail.*"
    commands:
      - tapOn:
          text: ".*[Cc]orreo.*|.*[Ee]mail.*"
      - inputText: ${TEST_SELLER_EMAIL}
      - tapOn:
          text: ".*[Cc]ontraseña.*|.*[Pp]assword.*|.*[Cc]lave.*"
      - inputText: ${TEST_SELLER_PASSWORD}
      - pressKey: Enter
- extendedWaitUntil:
    visible:
      text: ".*[Cc]omercio.*|.*[Cc]liente.*|.*[Rr]uta.*|.*[Cc]at[aá]logo.*|.*SINCRONIZAR.*"
    timeout: 60000

# Seleccionar comercio
- tapOn:
    text: ".*[Bb]uscar.*|.*[Ss]earch.*"
    optional: true
- inputText: ${TEST_COMMERCE_NAME}
- extendedWaitUntil:
    visible:
      text: ".*${TEST_COMMERCE_NAME}.*"
    timeout: 10000
- tapOn:
    text: ".*${TEST_COMMERCE_NAME}.*"
- extendedWaitUntil:
    visible:
      text: ".*[Cc]at[aá]logo.*|.*[Pp]roduct.*|.*${TEST_PRODUCT_CATEGORY}.*"
    timeout: 30000

# PRINORTE-14-01: Pedido sugerido debe ser visible
# BUG CONOCIDO: error en ERP de Prinorte impide cargar el pedido sugerido
- assertVisible:
    text: ".*[Ss]ugerido.*|.*[Pp]edido [Ss]ugerido.*|.*[Úú]ltim[ao] [Oo]rden.*|.*[Rr]eorden.*"
