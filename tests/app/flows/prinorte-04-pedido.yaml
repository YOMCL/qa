appId: ${APP_PACKAGE}
name: "PRINORTE-04: Toma de pedido"
# ⚠️ PRODUCCIÓN — Se detiene ANTES del botón final de envío

---

# Login inicial
- stopApp
- launchApp
- runFlow:
    when:
      visible:
        text: ".*[Cc]orreo.*|.*[Ee]mail.*"
    commands:
      - tapOn:
          text: ".*[Cc]orreo.*|.*[Ee]mail.*"
      - inputText: ${TEST_SELLER_EMAIL}
      - tapOn:
          text: ".*[Cc]ontraseña.*|.*[Pp]assword.*|.*[Cc]lave.*"
      - inputText: ${TEST_SELLER_PASSWORD}
      - pressKey: Enter
      - runFlow:
          when:
            visible:
              text: ".*Samsung Pass.*"
          commands:
            - tapOn:
                text: "Cancelar"
      - tapOn:
          text: ".*[Ee]ntrar.*"
          optional: true
- extendedWaitUntil:
    visible:
      text: ".*[Cc]omercio.*|.*[Cc]liente.*|.*[Rr]uta.*|.*[Cc]at[aá]logo.*|.*SINCRONIZAR.*"
    timeout: 60000
- tapOn:
    text: ".*SINCRONIZAR.*|.*[Ss]incronizar.*"
    optional: true
- extendedWaitUntil:
    notVisible:
      text: ".*SINCRONIZAR.*"
    timeout: 120000

# PRINORTE-04-01: Seleccionar comercio
- tapOn:
    text: ".*[Cc]omercio.*|.*[Cc]liente.*|.*[Rr]uta.*"
    optional: true
- tapOn:
    text: ".*[Bb]uscar.*|.*[Ss]earch.*"
    optional: true
- inputText: ${TEST_COMMERCE_NAME}
- extendedWaitUntil:
    visible:
      text: ".*${TEST_COMMERCE_NAME}.*"
    timeout: 10000
- tapOn:
    text: ".*${TEST_COMMERCE_NAME}.*"
    optional: true

# PRINORTE-04-02: Producto visible en catálogo
- extendedWaitUntil:
    visible:
      text: ".*${TEST_PRODUCT_NAME}.*"
    timeout: 30000

# PRINORTE-04-03: Agregar producto al carro
- tapOn:
    text: ".*${TEST_PRODUCT_NAME}.*"
- tapOn:
    text: ".*\\+.*|.*[Aa]gregar.*"
    optional: true
- assertVisible:
    text: ".*1.*"

# PRINORTE-04-04: Precio correcto en carro
- tapOn:
    text: ".*[Cc]arro.*|.*[Pp]edido.*|.*[Vv]er [Pp]edido.*"
    optional: true
- assertVisible:
    text: ".*${TEST_PRODUCT_NAME}.*"
- assertVisible:
    text: ".*25.*108.*|.*${TEST_PRODUCT_PRICE}.*"

# PRINORTE-04-05: Resumen del pedido visible
# ⚠️ STOP — no tocar Confirmar/Enviar/Finalizar
- extendedWaitUntil:
    visible:
      text: ".*[Rr]esumen.*|.*[Tt]otal.*|.*[Ss]ubtotal.*"
    timeout: 10000
