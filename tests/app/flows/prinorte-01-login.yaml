appId: ${APP_PACKAGE}
name: "PRINORTE-01: Login"

---

# Login una vez — los sub-tests comparten sesión
- clearState
- launchApp
- tapOn:
    text: ".*[Cc]orreo.*|.*[Ee]mail.*"
- inputText: ${TEST_SELLER_EMAIL}
- tapOn:
    text: ".*[Cc]ontraseña.*|.*[Pp]assword.*|.*[Cc]lave.*"
- inputText: ${TEST_SELLER_PASSWORD}
- pressKey: Enter
- runFlow:
    when:
      visible:
        text: ".*Samsung Pass.*"
    commands:
      - tapOn:
          text: "Cancelar"
- tapOn:
    text: ".*[Ee]ntrar.*"
    optional: true
- extendedWaitUntil:
    visible:
      text: ".*[Cc]omercio.*|.*[Cc]liente.*|.*[Rr]uta.*|.*[Cc]at[aá]logo.*|.*SINCRONIZAR.*"
    timeout: 60000

# PRINORTE-01-02: Sin botones Google/Facebook
- assertNotVisible:
    text: ".*Google.*"
- assertNotVisible:
    text: ".*Facebook.*"
