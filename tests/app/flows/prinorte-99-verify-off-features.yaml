appId: ${APP_PACKAGE}
name: "PRINORTE-99: Verificar features OFF"

---

- stopApp
- launchApp
- runFlow:
    when:
      visible:
        text: ".*[Cc]orreo.*|.*[Ee]mail.*"
    commands:
      - tapOn:
          text: ".*[Cc]orreo.*|.*[Ee]mail.*"
      - inputText: ${TEST_SELLER_EMAIL}
      - tapOn:
          text: ".*[Cc]ontraseña.*|.*[Pp]assword.*|.*[Cc]lave.*"
      - inputText: ${TEST_SELLER_PASSWORD}
      - pressKey: Enter
      - runFlow:
          when:
            visible:
              text: ".*Samsung Pass.*"
          commands:
            - tapOn:
                text: "Cancelar"
      - tapOn:
          text: ".*[Ee]ntrar.*"
          optional: true
- extendedWaitUntil:
    visible:
      text: ".*[Cc]omercio.*|.*[Cc]liente.*|.*[Rr]uta.*|.*[Cc]at[aá]logo.*|.*SINCRONIZAR.*"
    timeout: 60000
- tapOn:
    text: ".*SINCRONIZAR.*|.*[Ss]incronizar.*"
    optional: true
- extendedWaitUntil:
    notVisible:
      text: ".*SINCRONIZAR.*"
    timeout: 120000

# PRINORTE-99-01: Sin Google/Facebook en login (ya verificado en 01 pero confirmamos)
- assertNotVisible:
    text: ".*Google.*"
- assertNotVisible:
    text: ".*Facebook.*"

# PRINORTE-99-02: Sin módulo de pagos
- assertNotVisible:
    text: ".*[Rr]ealizar [Pp]ago.*|.*[Pp]agar [Dd]euda.*"
    optional: true
- tapOn:
    text: ".*[Cc]omercio.*|.*[Cc]liente.*|.*[Rr]uta.*"
    optional: true
- tapOn:
    text: ".*[Bb]uscar.*|.*[Ss]earch.*"
    optional: true
- inputText: ${TEST_COMMERCE_NAME}
- extendedWaitUntil:
    visible:
      text: ".*${TEST_COMMERCE_NAME}.*"
    timeout: 10000
- tapOn:
    text: ".*${TEST_COMMERCE_NAME}.*"
    optional: true
- assertNotVisible:
    text: ".*[Cc]obrar.*|.*[Pp]ago.*[Ll]ine.*"
    optional: true

# PRINORTE-99-03: Sin notas de crédito
- assertNotVisible:
    text: ".*[Nn]ota.*[Cc]r[eé]dito.*"

# PRINORTE-99-04: Sin módulo de tareas
- assertNotVisible:
    text: ".*[Tt]areas.*[Gg]rowth.*|.*[Gg]rowth.*[Tt]ask.*"

# PRINORTE-99-05: Sin puntos/fidelización
- assertNotVisible:
    text: ".*[Pp]untos.*|.*[Ff]idelizaci[oó]n.*"

# PRINORTE-99-06: Sin selector múltiples DC
- assertNotVisible:
    text: ".*[Ss]eleccionar.*[Cc]entro.*|.*[Cc]ambiar.*DC.*"
    optional: true

# PRINORTE-99-07: Sin Orden de Compra
- assertNotVisible:
    text: ".*[Oo]rden.*[Cc]ompra.*|.*Purchase Order.*"

# PRINORTE-99-08: Sin lista de facturas
- assertNotVisible:
    text: ".*[Mm]is [Ff]acturas.*"
    optional: true
