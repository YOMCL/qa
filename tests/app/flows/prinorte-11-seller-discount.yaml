appId: ${APP_PACKAGE}
name: "PRINORTE-11: Descuento de vendedor"
# enableSellerDiscount = true (solo producción)
# ⚠️ PRODUCCIÓN — verificar UI, no confirmar pedido

---

- stopApp
- launchApp
- runFlow:
    when:
      visible:
        text: ".*[Cc]orreo.*|.*[Ee]mail.*"
    commands:
      - tapOn:
          text: ".*[Cc]orreo.*|.*[Ee]mail.*"
      - inputText: ${TEST_SELLER_EMAIL}
      - tapOn:
          text: ".*[Cc]ontraseña.*|.*[Pp]assword.*|.*[Cc]lave.*"
      - inputText: ${TEST_SELLER_PASSWORD}
      - pressKey: Enter
      - runFlow:
          when:
            visible:
              text: ".*Samsung Pass.*"
          commands:
            - tapOn:
                text: "Cancelar"
      - tapOn:
          text: ".*[Ee]ntrar.*"
          optional: true
- extendedWaitUntil:
    visible:
      text: ".*[Cc]omercio.*|.*[Cc]liente.*|.*[Rr]uta.*|.*[Cc]at[aá]logo.*|.*SINCRONIZAR.*"
    timeout: 60000
- tapOn:
    text: ".*SINCRONIZAR.*|.*[Ss]incronizar.*"
    optional: true
- extendedWaitUntil:
    notVisible:
      text: ".*SINCRONIZAR.*"
    timeout: 120000
- tapOn:
    text: ".*[Cc]omercio.*|.*[Cc]liente.*|.*[Rr]uta.*"
    optional: true
- tapOn:
    text: ".*[Bb]uscar.*|.*[Ss]earch.*"
    optional: true
- inputText: ${TEST_COMMERCE_NAME}
- extendedWaitUntil:
    visible:
      text: ".*${TEST_COMMERCE_NAME}.*"
    timeout: 10000
- tapOn:
    text: ".*${TEST_COMMERCE_NAME}.*"
    optional: true
- extendedWaitUntil:
    visible:
      text: ".*${TEST_PRODUCT_NAME}.*"
    timeout: 30000
- tapOn:
    text: ".*${TEST_PRODUCT_NAME}.*"
- tapOn:
    text: ".*\\+.*"
    optional: true
- tapOn:
    text: ".*[Cc]arro.*|.*[Pp]edido.*|.*[Vv]er [Pp]edido.*"
    optional: true

# PRINORTE-11-01: Opción descuento vendedor visible en carro
- assertVisible:
    text: ".*[Dd]escuento.*[Vv]endedor.*|.*[Dd]escuento.*[Mm]anual.*|.*[Dd]cto.*[Vv]end.*"

# PRINORTE-11-02: Ingresar descuento y verificar nuevo total
- tapOn:
    text: ".*[Dd]escuento.*[Vv]endedor.*|.*[Dd]cto.*"
    optional: true
- inputText: "5"
- assertVisible:
    text: ".*[Tt]otal.*|.*[Nn]uevo.*[Pp]recio.*|.*[Dd]escuento.*"
# ⚠️ STOP — no confirmar pedido
