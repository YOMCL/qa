appId: ${APP_PACKAGE}
---
# Disparar sincronización
- tapOn:
    text: ".*SINCRONIZAR.*|.*[Ss]incronizar.*"
    optional: true

# Descartar popup "nueva versión" si apareció antes del sync
- runFlow:
    when:
      visible:
        text: ".*ACTUALIZAR.*|.*[Nn]ueva.*versi[oó]n.*"
    commands:
      - tapOn:
          text: "CANCELAR"
          optional: true
      - waitForAnimationToEnd

# Si aparece popup de error de sync, reintentar (intento 1)
- runFlow:
    when:
      visible:
        text: ".*[Vv]olver a sincronizar.*"
    commands:
      - tapOn:
          text: "Volver a sincronizar"
      - waitForAnimationToEnd

# Esperar que el re-sync intento 1 termine (60s)
- extendedWaitUntil:
    notVisible:
      text: ".*[Ss]incronizando.*"
    timeout: 60000

# Si sigue fallando, reintentar una vez más (intento 2)
- runFlow:
    when:
      visible:
        text: ".*[Vv]olver a sincronizar.*"
    commands:
      - tapOn:
          text: "Volver a sincronizar"
      - waitForAnimationToEnd

# Esperar que el re-sync intento 2 termine (60s)
- extendedWaitUntil:
    notVisible:
      text: ".*[Ss]incronizando.*"
    timeout: 60000

# Si todavía falla, último intento (intento 3)
- runFlow:
    when:
      visible:
        text: ".*[Vv]olver a sincronizar.*"
    commands:
      - tapOn:
          text: "Volver a sincronizar"
      - waitForAnimationToEnd

# Esperar sync principal — 180s: device físico ~40s; margen para red lenta
# (el popup puede tener "CANCELAR" visible independientemente del estado)
- extendedWaitUntil:
    notVisible:
      text: ".*[Ss]incronizando.*"
    timeout: 180000

# Si después de 3 reintentos sigue fallando, seguir sin sincronizar (fallback definitivo)
- runFlow:
    when:
      visible:
        text: ".*[Ss]eguir sin sincronizar.*|.*[Vv]olver a sincronizar.*"
    commands:
      - tapOn:
          text: "Seguir sin sincronizar"
      - waitForAnimationToEnd

# Descartar popup "nueva versión" que puede aparecer post-sync
- runFlow:
    when:
      visible:
        text: ".*ACTUALIZAR.*|.*[Nn]ueva.*versi[oó]n.*"
    commands:
      - tapOn:
          text: "CANCELAR"
          optional: true
      - waitForAnimationToEnd

# Confirmar que estamos en la lista de comercios
- extendedWaitUntil:
    visible:
      text: "Listado de comercios|.*ACTUALIZAR.*"
    timeout: 30000

# Dar tiempo a la UI para renderizar completamente
- waitForAnimationToEnd

# Segundo descarte si el popup reapareció
- runFlow:
    when:
      visible:
        text: ".*ACTUALIZAR.*|.*[Nn]ueva.*versi[oó]n.*"
    commands:
      - tapOn:
          text: "CANCELAR"
          optional: true
      - waitForAnimationToEnd
