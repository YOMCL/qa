appId: ${APP_PACKAGE}
name: "PRINORTE-03: Comercios / Clientes"

---

# Login inicial
- stopApp
- launchApp
- runFlow:
    when:
      visible:
        text: ".*[Cc]orreo.*|.*[Ee]mail.*"
    commands:
      - tapOn:
          text: ".*[Cc]orreo.*|.*[Ee]mail.*"
      - inputText: ${TEST_SELLER_EMAIL}
      - tapOn:
          text: ".*[Cc]ontraseña.*|.*[Pp]assword.*|.*[Cc]lave.*"
      - inputText: ${TEST_SELLER_PASSWORD}
      - pressKey: Enter
      - runFlow:
          when:
            visible:
              text: ".*Samsung Pass.*"
          commands:
            - tapOn:
                text: "Cancelar"
      - tapOn:
          text: ".*[Ee]ntrar.*"
          optional: true
- extendedWaitUntil:
    visible:
      text: ".*[Cc]omercio.*|.*[Cc]liente.*|.*[Rr]uta.*|.*[Cc]at[aá]logo.*|.*SINCRONIZAR.*"
    timeout: 60000
- tapOn:
    text: ".*SINCRONIZAR.*|.*[Ss]incronizar.*"
    optional: true
- extendedWaitUntil:
    notVisible:
      text: ".*SINCRONIZAR.*"
    timeout: 120000

# PRINORTE-03-01: Commerce de prueba visible en lista
- tapOn:
    text: ".*[Cc]omercio.*|.*[Cc]liente.*|.*[Rr]uta.*"
    optional: true
- tapOn:
    text: ".*[Bb]uscar.*|.*[Ss]earch.*"
    optional: true
- inputText: ${TEST_COMMERCE_NAME}
- extendedWaitUntil:
    visible:
      text: ".*${TEST_COMMERCE_NAME}.*"
    timeout: 10000

# PRINORTE-03-02: Datos del comercio (ciudad)
- tapOn:
    text: ".*${TEST_COMMERCE_NAME}.*"
- extendedWaitUntil:
    visible:
      text: ".*${TEST_COMMERCE_NAME}.*"
    timeout: 10000
- assertVisible:
    text: ".*${TEST_COMMERCE_CITY}.*|.*[Aa]ntofagasta.*"

# PRINORTE-03-03: Canal visible (ALMACEN/BAZAR)
- assertVisible:
    text: ".*[Aa]lmac[eé]n.*|.*[Bb]azar.*|.*${TEST_COMMERCE_CHANNEL}.*"

# PRINORTE-03-04: Filtro sin venta disponible
- pressKey: Back
- assertVisible:
    text: ".*[Ss]in [Vv]enta.*|.*[Ss]in [Cc]ompra.*|.*[Ff]iltro.*"
    optional: true
